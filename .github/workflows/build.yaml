name: build docker image

on:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/emircnid/eadownloader:latest
            ghcr.io/emircnid/eadownloader:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/emircnID/EaDownloader
          cache-from: type=gha
          cache-to: type=gha,mode=max
