services:
  bot:
    environment:
      BOT_API_URL: http://telegram-bot-api:8081
    depends_on:
      telegram-bot-api:
        condition: service_started

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: eadownloader-telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?set TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_HTTP_IP_ADDRESS: 0.0.0.0
      TELEGRAM_HTTP_PORT: 8081
    volumes:
      - botapi-data:/var/lib/telegram-bot-api
      - ./downloads:/app/downloads:ro
    networks:
      - eadownloader-network

volumes:
  botapi-data:
