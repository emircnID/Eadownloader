services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: eadownloader-bot-dev
    restart: unless-stopped
    networks:
      - eadownloader-network
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:${METRICS_PORT:-8080}:${METRICS_PORT:-8080}"
      - "127.0.0.1:${PROFILER_PORT:-6060}:${PROFILER_PORT:-6060}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    container_name: eadownloader-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-eadownloader}
      POSTGRES_USER: ${DB_USER:-eadownloader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - eadownloader-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 3s
      timeout: 5s
      retries: 30

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: eadownloader-pgweb-dev
    restart: unless-stopped
    command: >
      --bind=0.0.0.0
      --url=postgres://${DB_USER:-eadownloader}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-eadownloader}?sslmode=disable
      --log-level=error
    environment:
      PGWEB_AUTH_USER: ${PGWEB_USER:-admin}
      PGWEB_AUTH_PASS: ${PGWEB_PASSWORD:-password}
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    networks:
      - eadownloader-network
    depends_on:
      db:
        condition: service_healthy

volumes:
  db:
  go-build-cache:
  go-mod-cache:

networks:
  eadownloader-network:
    driver: bridge
