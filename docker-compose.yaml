services:
  bot:
    image: ghcr.io/emircnid/ea-downloader:latest
    container_name: eadownloader-bot
    restart: unless-stopped
    networks:
      - eadownloader-network
    env_file:
      - .env
    volumes:
      - ./private:/app/private
      - ./logs:/app/logs
      - ./downloads:/app/downloads
    ports:
      - "127.0.0.1:${METRICS_PORT:-8080}:${METRICS_PORT:-8080}"
      - "127.0.0.1:${PROFILER_PORT:-6060}:${PROFILER_PORT:-6060}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    container_name: eadownloader-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-eadownloader}
      POSTGRES_USER: ${DB_USER:-eadownloader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - eadownloader-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 3s
      timeout: 5s
      retries: 30

volumes:
  db:

networks:
  eadownloader-network:
    driver: bridge
